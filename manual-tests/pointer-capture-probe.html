<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pointer capture probe</title>
<style>
  html { user-select: none; -webkit-user-select: none; touch-action: none; }
  body { font: 14px/1.4 system-ui, sans-serif; margin: 0; background: #234; color: #eee; }
  #box {
    width: 140px; height: 140px; margin: 1rem; border-radius: .5rem;
    background: #468; color: #fff; display: grid; place-items: center;
    font-size: 18px; cursor: grab; touch-action: none;
  }
  #box.down { background: #2a7; cursor: grabbing; }
  #hint { margin: 0 1rem; }
  #hint b { color: #6f6; }
  #bar { padding: 0 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
  #log {
    margin: 1rem; padding: .5rem; height: 50vh; overflow: auto;
    background: #111; color: #6f6; font: 11px/1.3 ui-monospace, monospace;
    white-space: pre; border-radius: .5rem;
  }
  #log .out { color: #fb4; }                       /* pointer outside the window */
  #log .cap { color: #6cf; }                       /* capture events / setPointerCapture */
  #log .win { color: #f6f; }                       /* window blur/focus, visibilitychange */
  #log .mark { color: #ff0; background: #331; }    /* first same-pointer event after LPC */
  button, label { font-size: 15px; }
</style>
</head>
<body>
  <div id="box">click me</div>
  <p id="hint">Hold, drag <b>out of the window</b>, let go out there. Watch the
    <b>>>> AFTER-LPC</b> line: where it lands ([EL] vs [DOC]) and its <b>btn</b>.</p>
  <div id="bar">
    <button id="clear" type="button">clear</button>
    <label><input id="useCapture" type="checkbox" checked> setPointerCapture</label>
    <label><input id="logMoves" type="checkbox" checked> log moves</label>
    <label><input id="recapture" type="checkbox"> recapture on LPC</label>
    <span id="capState"></span>
  </div>
  <pre id="log"></pre>

<script>
  const box = document.getElementById('box');
  const logEl = document.getElementById('log');
  const useCapture = document.getElementById('useCapture');
  const logMoves = document.getElementById('logMoves');
  const recaptureCb = document.getElementById('recapture');
  const capState = document.getElementById('capState');
  let seq = 0;
  let activeId = null;
  let lpcArmed = false;   // mark the next same-pointer event after lostpointercapture
  let sawUp = false;      // did a pointerup for the active pointer fire before LPC?

  function inWindow(e) {
    return e.clientX >= 0 && e.clientY >= 0
      && e.clientX <= innerWidth && e.clientY <= innerHeight;
  }

  function targetName(t) {
    return t && t.nodeName ? t.nodeName + (t.id ? '#' + t.id : '') : String(t);
  }

  function emit(kind, text, e) {
    const div = document.createElement('div');
    div.textContent = text;
    div.className = kind || (e && !inWindow(e) ? 'out' : '');
    logEl.appendChild(div);
    logEl.scrollTop = logEl.scrollHeight;
    console.log(text);
  }

  function hasCap() {
    return activeId != null && box.hasPointerCapture(activeId);
  }

  // EL = the box's own listener fired (event reached the captured element).
  // DOC = the document listener fired (always, via capture/bubble). DOC with no EL
  // for the same event = element-level delivery stopped.
  function logEvent(where, e) {
    if (e.type === 'pointermove' && !logMoves.checked) return;
    const isLpc = e.type === 'lostpointercapture';

    // Text tags so the meaningful moments survive a copy-paste (color does not).
    let tag = '';
    if (isLpc) tag = '*** LPC *** ';
    else if (e.type === 'gotpointercapture') tag = '*** GPC *** ';
    else if (lpcArmed && e.pointerId === activeId) {
      tag = '>>> AFTER-LPC ';
      lpcArmed = false;
    }
    if (e.type === 'pointerup' && e.pointerId === activeId) sawUp = true;
    const extra = isLpc ? ` (pointerup-before-lpc=${sawUp ? 'Y' : 'N'})` : '';
    if (isLpc) lpcArmed = true;

    emit(tag ? (/AFTER/.test(tag) ? 'mark' : 'cap') : '',
      `${tag}[${where}] #${String(++seq).padStart(3)} ${e.type.padEnd(18)}` +
      ` ${(e.pointerType || '').padEnd(5)} id=${e.pointerId} prim=${e.isPrimary}` +
      ` btn=${e.buttons} in=${inWindow(e) ? 'Y' : 'N'} hasCap=${hasCap() ? 'Y' : 'N'}` +
      ` tgt=${targetName(e.target)}${extra}`, e);
    capState.textContent = 'hasPointerCapture: ' + hasCap();
  }

  const POINTER = ['pointerdown', 'pointermove', 'pointerup', 'pointercancel',
    'gotpointercapture', 'lostpointercapture',
    'pointerover', 'pointerout', 'pointerenter', 'pointerleave'];

  for (const type of POINTER) {
    document.addEventListener(type, e => logEvent('DOC', e), true);   // capture phase
    box.addEventListener(type, e => logEvent('EL ', e));              // bubble; only if box in path
  }

  // Can capture be restored after it is lost? Attempt it once per LPC, if enabled.
  document.addEventListener('lostpointercapture', e => {
    if (e.pointerId !== activeId || !recaptureCb.checked) return;
    try {
      box.setPointerCapture(activeId);
      emit('cap', `      recapture attempt -> hasCap=${box.hasPointerCapture(activeId) ? 'Y' : 'N'}`);
    } catch (err) {
      emit('cap', `      recapture FAILED: ${err}`);
    }
  });

  // Mouse events — to confirm whether mousemove/mouseup fire off-window.
  for (const type of ['mousedown', 'mousemove', 'mouseup']) {
    document.addEventListener(type, e => {
      if (e.type === 'mousemove' && !logMoves.checked) return;
      emit('', `[DOC] #${String(++seq).padStart(3)} ${e.type.padEnd(18)} mouse` +
        ` btn=${e.buttons} in=${inWindow(e) ? 'Y' : 'N'} tgt=${targetName(e.target)}`, e);
    }, true);
  }

  for (const type of ['blur', 'focus']) {
    window.addEventListener(type, () =>
      emit('win', `#${String(++seq).padStart(3)} window.${type}`));
  }
  document.addEventListener('visibilitychange', () =>
    emit('win', `#${String(++seq).padStart(3)} visibilitychange -> ${document.visibilityState}`));

  box.addEventListener('pointerdown', e => {
    activeId = e.pointerId;
    lpcArmed = false;
    sawUp = false;
    box.classList.add('down');
    if (useCapture.checked) {
      try {
        box.setPointerCapture(e.pointerId);
        emit('cap', `[EL ] #${String(++seq).padStart(3)} setPointerCapture -> hasCap=${box.hasPointerCapture(e.pointerId) ? 'Y' : 'N'}`);
      } catch (err) {
        emit('cap', `setPointerCapture FAILED: ${err}`);
      }
    }
  });
  const clearDown = () => box.classList.remove('down');
  box.addEventListener('pointerup', clearDown);
  box.addEventListener('pointercancel', clearDown);

  document.getElementById('clear').addEventListener('click', () => {
    logEl.textContent = '';
    seq = 0;
  });
</script>
</body>
</html>
