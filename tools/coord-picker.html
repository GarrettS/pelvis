<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coordinate Picker — Anatomize This</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'SF Mono', 'Menlo', monospace;
    font-size: 13px;
    background: #1a1a2e;
    color: #e0e0e0;
    padding: 1rem;
  }
  h1 { font-size: 1.2rem; margin-bottom: .75rem; color: #7ec8e3; }
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    align-items: center;
    margin-bottom: .75rem;
    padding: .5rem;
    background: #16213e;
    border-radius: 6px;
  }
  select, button, input {
    font-family: inherit;
    font-size: 12px;
    padding: .3rem .6rem;
    border-radius: 4px;
    border: 1px solid #334;
    background: #0f3460;
    color: #e0e0e0;
    cursor: pointer;
  }
  button:hover { background: #1a5276; }
  button.active { background: #7ec8e3; color: #1a1a2e; font-weight: 700; }
  .workspace {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .image-panel {
    position: relative;
    flex-shrink: 0;
    cursor: crosshair;
    border: 2px solid #334;
    border-radius: 4px;
    overflow: hidden;
    background: #111;
  }
  .image-panel img {
    display: block;
    max-width: 800px;
    max-height: 700px;
    width: auto;
    height: auto;
  }
  .image-panel canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }
  .crosshair-h, .crosshair-v {
    position: absolute;
    pointer-events: none;
    background: rgba(126, 200, 227, 0.4);
  }
  .crosshair-h { height: 1px; width: 100%; left: 0; }
  .crosshair-v { width: 1px; height: 100%; top: 0; }
  .coord-tooltip {
    position: absolute;
    pointer-events: none;
    background: rgba(0, 0, 0, 0.85);
    color: #7ec8e3;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
    white-space: nowrap;
  }
  .side-panel {
    flex: 1;
    min-width: 300px;
    max-width: 500px;
    max-height: 700px;
    overflow-y: auto;
  }
  .output-section {
    background: #16213e;
    border-radius: 6px;
    padding: .75rem;
    margin-bottom: .75rem;
  }
  .output-section h3 {
    font-size: .85rem;
    color: #7ec8e3;
    margin-bottom: .5rem;
  }
  .point-list {
    list-style: none;
    max-height: 200px;
    overflow-y: auto;
  }
  .point-list li {
    padding: .2rem .4rem;
    border-bottom: 1px solid #223;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .point-list li .remove-btn {
    background: #c0392b;
    border: none;
    color: white;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    cursor: pointer;
  }
  #json-output {
    width: 100%;
    min-height: 120px;
    background: #0d1117;
    color: #58a6ff;
    border: 1px solid #334;
    border-radius: 4px;
    font-family: inherit;
    font-size: 11px;
    padding: .5rem;
    resize: vertical;
  }
  .structure-input {
    display: flex;
    gap: .5rem;
    margin-bottom: .5rem;
    align-items: center;
  }
  .structure-input input {
    flex: 1;
  }
  .structure-input label {
    font-size: 11px;
    color: #aaa;
    white-space: nowrap;
  }
  .grid-toggle { margin-left: auto; }
  .help {
    font-size: 11px;
    color: #888;
    margin-top: .5rem;
    line-height: 1.6;
  }
  .mode-label {
    font-size: 11px;
    color: #aaa;
    margin-right: .25rem;
  }
  .recorded-item {
    background: #0f3460;
    border-radius: 4px;
    padding: .4rem .6rem;
    margin-bottom: .5rem;
    font-size: 11px;
    line-height: 1.5;
    word-break: break-all;
  }
  .recorded-item .label { color: #7ec8e3; font-weight: 700; }
  .recorded-item .value { color: #c0c0c0; }
  .btn-row { display: flex; gap: .3rem; flex-wrap: wrap; }
</style>
</head>
<body>
<h1>Coordinate Picker</h1>

<div class="toolbar">
  <span class="mode-label">Image:</span>
  <select id="image-select">
    <option value="../img/PRI-1-Pelvic-Outlet2.jpg">Pelvic Outlet (blank_panels)</option>
    <option value="../img/pelvis-angle-r-side.png">Anterior Pelvis (label_hunt)</option>
    <option value="../img/left-aic.png">L AIC Chain</option>
  </select>

  <span class="mode-label">Mode:</span>
  <button class="active" data-mode="point" id="btn-point">Point</button>
  <button data-mode="box" id="btn-box">Box</button>
  <button data-mode="polygon" id="btn-polygon">Polygon</button>

  <span class="mode-label">Grid:</span>
  <button id="btn-grid-10">10%</button>
  <button id="btn-grid-5">5%</button>
  <button id="btn-grid-off" class="active">Off</button>

  <button id="btn-undo">Undo</button>
  <button id="btn-clear">Clear All</button>
</div>

<div class="structure-input">
  <label>Structure ID:</label>
  <input type="text" id="structure-id" placeholder="e.g. obturator_internus" />
  <label>Field:</label>
  <select id="field-select">
    <option value="arrowTo">arrowTo</option>
    <option value="landmarkMarker">landmarkMarker</option>
    <option value="panelBox">panelBox</option>
    <option value="hitbox">hitbox</option>
    <option value="polygon">polygon</option>
    <option value="anchor">anchor (AIC)</option>
  </select>
  <button id="btn-record">Record Current</button>
</div>

<div class="workspace">
  <div class="image-panel" id="image-panel">
    <img id="target-img" />
    <canvas id="overlay-canvas"></canvas>
    <div class="crosshair-h" id="ch-h"></div>
    <div class="crosshair-v" id="ch-v"></div>
    <div class="coord-tooltip" id="tooltip" style="display:none;"></div>
  </div>

  <div class="side-panel">
    <div class="output-section">
      <h3>Current Points</h3>
      <ul class="point-list" id="point-list"></ul>
      <div class="help" id="mode-help">
        <strong>Point mode:</strong> Click to record a single {x, y} coordinate.
      </div>
    </div>

    <div class="output-section">
      <h3>Recorded Structures</h3>
      <div id="recorded-list"></div>
    </div>

    <div class="output-section">
      <h3>JSON Output</h3>
      <div class="btn-row" style="margin-bottom:.4rem;">
        <button id="btn-copy">Copy JSON</button>
        <button id="btn-copy-all">Copy All Recorded</button>
      </div>
      <textarea id="json-output" readonly></textarea>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const imgEl = document.getElementById('target-img');
  const canvas = document.getElementById('overlay-canvas');
  const ctx = canvas.getContext('2d');
  const panel = document.getElementById('image-panel');
  const chH = document.getElementById('ch-h');
  const chV = document.getElementById('ch-v');
  const tooltip = document.getElementById('tooltip');
  const pointList = document.getElementById('point-list');
  const jsonOutput = document.getElementById('json-output');
  const modeHelp = document.getElementById('mode-help');
  const recordedList = document.getElementById('recorded-list');
  const imageSelect = document.getElementById('image-select');
  const structureIdInput = document.getElementById('structure-id');
  const fieldSelect = document.getElementById('field-select');

  let mode = 'point';
  let grid = 0;
  let points = [];
  let boxStart = null;
  let dragging = false;
  let recorded = [];
  let imgNatW = 0;
  let imgNatH = 0;

  function loadImage(src) {
    imgEl.src = src;
    imgEl.onload = function() {
      imgNatW = imgEl.naturalWidth;
      imgNatH = imgEl.naturalHeight;
      canvas.width = imgEl.clientWidth;
      canvas.height = imgEl.clientHeight;
      clearPoints();
      redraw();
    };
  }

  imageSelect.addEventListener('change', function() {
    loadImage(imageSelect.value);
  });

  loadImage(imageSelect.value);

  window.addEventListener('resize', function() {
    canvas.width = imgEl.clientWidth;
    canvas.height = imgEl.clientHeight;
    redraw();
  });

  // Mode buttons
  document.querySelectorAll('[data-mode]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      mode = btn.dataset.mode;
      document.querySelectorAll('[data-mode]').forEach(function(b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
      clearPoints();
      updateHelp();

      // Auto-set field based on mode
      if (mode === 'point') {
        fieldSelect.value = 'arrowTo';
      } else if (mode === 'box') {
        fieldSelect.value = 'panelBox';
      } else if (mode === 'polygon') {
        fieldSelect.value = 'polygon';
      }
    });
  });

  // Grid buttons
  document.getElementById('btn-grid-10').addEventListener('click', function() {
    grid = 10;
    updateGridButtons();
    redraw();
  });
  document.getElementById('btn-grid-5').addEventListener('click', function() {
    grid = 5;
    updateGridButtons();
    redraw();
  });
  document.getElementById('btn-grid-off').addEventListener('click', function() {
    grid = 0;
    updateGridButtons();
    redraw();
  });

  function updateGridButtons() {
    document.getElementById('btn-grid-10').classList.toggle('active', grid === 10);
    document.getElementById('btn-grid-5').classList.toggle('active', grid === 5);
    document.getElementById('btn-grid-off').classList.toggle('active', grid === 0);
  }

  document.getElementById('btn-undo').addEventListener('click', function() {
    if (points.length > 0) {
      points.pop();
      updatePointList();
      updateJson();
      redraw();
    }
  });

  document.getElementById('btn-clear').addEventListener('click', function() {
    clearPoints();
  });

  document.getElementById('btn-record').addEventListener('click', function() {
    recordCurrent();
  });

  document.getElementById('btn-copy').addEventListener('click', function() {
    jsonOutput.select();
    navigator.clipboard.writeText(jsonOutput.value);
  });

  document.getElementById('btn-copy-all').addEventListener('click', function() {
    const allJson = JSON.stringify(recorded, null, 2);
    navigator.clipboard.writeText(allJson);
  });

  function getPercent(e) {
    const rect = imgEl.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width * 100);
    const y = ((e.clientY - rect.top) / rect.height * 100);
    return {
      x: Math.round(x * 10) / 10,
      y: Math.round(y * 10) / 10
    };
  }

  panel.addEventListener('mousemove', function(e) {
    const rect = imgEl.getBoundingClientRect();
    const relX = e.clientX - rect.left;
    const relY = e.clientY - rect.top;
    const pct = getPercent(e);

    chH.style.top = relY + 'px';
    chV.style.left = relX + 'px';
    tooltip.style.display = '';
    tooltip.style.left = (relX + 12) + 'px';
    tooltip.style.top = (relY - 20) + 'px';
    tooltip.textContent = pct.x.toFixed(1) + ', ' + pct.y.toFixed(1);

    if (dragging && boxStart) {
      redraw();
      const cw = canvas.width;
      const ch = canvas.height;
      const sx = boxStart.x / 100 * cw;
      const sy = boxStart.y / 100 * ch;
      const ex = pct.x / 100 * cw;
      const ey = pct.y / 100 * ch;
      ctx.strokeStyle = 'rgba(126, 200, 227, 0.8)';
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.strokeRect(sx, sy, ex - sx, ey - sy);
      ctx.setLineDash([]);
    }
  });

  panel.addEventListener('mouseleave', function() {
    tooltip.style.display = 'none';
  });

  panel.addEventListener('mousedown', function(e) {
    if (e.button !== 0) return;
    const pct = getPercent(e);

    if (mode === 'box') {
      boxStart = pct;
      dragging = true;
      e.preventDefault();
    }
  });

  panel.addEventListener('mouseup', function(e) {
    if (e.button !== 0) return;
    const pct = getPercent(e);

    if (mode === 'box' && dragging && boxStart) {
      dragging = false;
      const x = Math.min(boxStart.x, pct.x);
      const y = Math.min(boxStart.y, pct.y);
      const w = Math.abs(pct.x - boxStart.x);
      const h = Math.abs(pct.y - boxStart.y);
      if (w > 0.5 && h > 0.5) {
        points = [{
          x: Math.round(x),
          y: Math.round(y),
          w: Math.round(w),
          h: Math.round(h)
        }];
        updatePointList();
        updateJson();
        redraw();
      }
      boxStart = null;
    }
  });

  panel.addEventListener('click', function(e) {
    if (mode === 'box') return; // handled by mouseup
    const pct = getPercent(e);

    if (mode === 'point') {
      points = [{x: Math.round(pct.x), y: Math.round(pct.y)}];
    } else if (mode === 'polygon') {
      points.push([Math.round(pct.x), Math.round(pct.y)]);
    }

    updatePointList();
    updateJson();
    redraw();
  });

  function clearPoints() {
    points = [];
    boxStart = null;
    dragging = false;
    updatePointList();
    updateJson();
    redraw();
  }

  function updatePointList() {
    pointList.innerHTML = '';
    points.forEach(function(p, i) {
      const li = document.createElement('li');
      if (Array.isArray(p)) {
        li.textContent = '[' + p[0] + ', ' + p[1] + ']';
      } else if (p.w !== undefined) {
        li.textContent = '{x:' + p.x + ', y:' + p.y +
            ', w:' + p.w + ', h:' + p.h + '}';
      } else {
        li.textContent = '{x:' + p.x + ', y:' + p.y + '}';
      }
      const btn = document.createElement('button');
      btn.className = 'remove-btn';
      btn.textContent = 'x';
      btn.addEventListener('click', function() {
        points.splice(i, 1);
        updatePointList();
        updateJson();
        redraw();
      });
      li.appendChild(btn);
      pointList.appendChild(li);
    });
  }

  function updateJson() {
    const field = fieldSelect.value;
    let json = '';

    if (mode === 'point' && points.length === 1) {
      const p = points[0];
      if (field === 'anchor') {
        json = field + ': [' + p.x + ', ' + p.y + ']';
      } else {
        json = field + ': {x: ' + p.x + ', y: ' + p.y + '}';
      }
    } else if (mode === 'box' && points.length === 1) {
      const p = points[0];
      json = field + ': {x: ' + p.x + ', y: ' + p.y +
          ', w: ' + p.w + ', h: ' + p.h + '}';
    } else if (mode === 'polygon' && points.length > 0) {
      json = field + ': [\n' +
          points.map(function(p) {
            return '  [' + p[0] + ', ' + p[1] + ']';
          }).join(',\n') + '\n]';
    }

    jsonOutput.value = json;
  }

  function recordCurrent() {
    if (points.length === 0) return;
    const id = structureIdInput.value.trim() || 'unnamed';
    const field = fieldSelect.value;
    let value;

    if (mode === 'point' && points.length === 1) {
      const p = points[0];
      if (field === 'anchor') {
        value = [p.x, p.y];
      } else {
        value = {x: p.x, y: p.y};
      }
    } else if (mode === 'box' && points.length === 1) {
      value = {x: points[0].x, y: points[0].y,
               w: points[0].w, h: points[0].h};
    } else if (mode === 'polygon') {
      value = points.slice();
    }

    if (value === undefined) return;

    // Find or create structure entry
    let entry = recorded.find(function(r) { return r.id === id; });
    if (!entry) {
      entry = {id: id};
      recorded.push(entry);
    }
    entry[field] = value;

    renderRecorded();
    clearPoints();
  }

  function renderRecorded() {
    recordedList.innerHTML = '';
    recorded.forEach(function(entry, i) {
      const div = document.createElement('div');
      div.className = 'recorded-item';
      let html = '<span class="label">' + entry.id + '</span><br>';
      Object.keys(entry).forEach(function(key) {
        if (key === 'id') return;
        html += '<span class="value">' + key + ': ' +
            JSON.stringify(entry[key]) + '</span><br>';
      });
      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.className = 'remove-btn';
      removeBtn.style.marginTop = '4px';
      removeBtn.addEventListener('click', function() {
        recorded.splice(i, 1);
        renderRecorded();
      });
      div.innerHTML = html;
      div.appendChild(removeBtn);
      recordedList.appendChild(div);
    });
  }

  function redraw() {
    const cw = canvas.width;
    const ch = canvas.height;
    ctx.clearRect(0, 0, cw, ch);

    // Grid
    if (grid > 0) {
      ctx.strokeStyle = 'rgba(126, 200, 227, 0.15)';
      ctx.lineWidth = 0.5;
      ctx.font = '10px monospace';
      ctx.fillStyle = 'rgba(126, 200, 227, 0.5)';

      for (let pct = grid; pct < 100; pct += grid) {
        const x = pct / 100 * cw;
        const y = pct / 100 * ch;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, ch);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(cw, y);
        ctx.stroke();
        ctx.fillText(pct + '%', x + 2, 11);
        ctx.fillText(pct + '%', 2, y - 2);
      }
    }

    // Draw recorded points/boxes/polygons
    points.forEach(function(p) {
      if (Array.isArray(p)) {
        // Polygon point
        const px = p[0] / 100 * cw;
        const py = p[1] / 100 * ch;
        ctx.beginPath();
        ctx.arc(px, py, 4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(231, 76, 60, 0.8)';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
      } else if (p.w !== undefined) {
        // Box
        const bx = p.x / 100 * cw;
        const by = p.y / 100 * ch;
        const bw = p.w / 100 * cw;
        const bh = p.h / 100 * ch;
        ctx.strokeStyle = 'rgba(46, 204, 113, 0.8)';
        ctx.lineWidth = 2;
        ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = 'rgba(46, 204, 113, 0.15)';
        ctx.fillRect(bx, by, bw, bh);
      } else {
        // Single point
        const px = p.x / 100 * cw;
        const py = p.y / 100 * ch;
        ctx.beginPath();
        ctx.arc(px, py, 6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(231, 76, 60, 0.8)';
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        // Crosshair
        ctx.strokeStyle = 'rgba(231, 76, 60, 0.5)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(px - 15, py);
        ctx.lineTo(px + 15, py);
        ctx.moveTo(px, py - 15);
        ctx.lineTo(px, py + 15);
        ctx.stroke();
      }
    });

    // Draw polygon lines if in polygon mode
    if (mode === 'polygon' && points.length > 1) {
      ctx.strokeStyle = 'rgba(231, 76, 60, 0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      const first = points[0];
      ctx.moveTo(first[0] / 100 * cw, first[1] / 100 * ch);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i][0] / 100 * cw, points[i][1] / 100 * ch);
      }
      if (points.length > 2) {
        ctx.lineTo(first[0] / 100 * cw, first[1] / 100 * ch);
      }
      ctx.stroke();
      ctx.fillStyle = 'rgba(231, 76, 60, 0.1)';
      ctx.fill();
    }
  }

  function updateHelp() {
    if (mode === 'point') {
      modeHelp.innerHTML =
          '<strong>Point mode:</strong> Click to record a single {x, y} coordinate. ' +
          'Use for arrowTo, landmarkMarker, or anchor.';
    } else if (mode === 'box') {
      modeHelp.innerHTML =
          '<strong>Box mode:</strong> Click and drag to define a rectangle. ' +
          'Use for panelBox or hitbox. Output: {x, y, w, h}.';
    } else if (mode === 'polygon') {
      modeHelp.innerHTML =
          '<strong>Polygon mode:</strong> Click to add vertices. ' +
          'Build a polygon boundary for muscle overlays. Each click adds a [x, y] pair.';
    }
  }

  updateHelp();
})();
</script>
</body>
</html>
